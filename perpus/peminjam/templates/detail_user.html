{% extends 'base.html' %}

{% block title %}Detail Anggota Perpustakaan{% endblock %}

{% block content %}
<div class="top-header">
    <div>
        <span>Manajemen Anggota</span>
        <h1>Informasi Detail Anggota</h1>
    </div>
</div>

<div class="card" style="max-width: 600px;">
    
    <div class="form-group" style="margin-bottom: 16px;">
        <label style="display: block; margin-bottom: 6px; font-weight: 600; color: #475569;">Nama Lengkap</label>
        <input type="text" value="{{ user.nama }}" style="width: 100%; padding: 12px 16px; border: 1px solid #e2e8f0; border-radius: 10px; background: #f8fafc; color: #0f172a; font-weight: 500;" readonly>
    </div>

    <div class="form-group" style="margin-bottom: 16px;">
        <label style="display: block; margin-bottom: 6px; font-weight: 600; color: #475569;">NIS (Nomor Induk Siswa)</label>
        <input type="text" value="{{ user.nis }}" style="width: 100%; padding: 12px 16px; border: 1px solid #e2e8f0; border-radius: 10px; background: #f8fafc; color: #0f172a; font-weight: 500;" readonly>
    </div>

    <div class="form-group" style="margin-bottom: 16px;">
        <label style="display: block; margin-bottom: 6px; font-weight: 600; color: #475569;">Kelas</label>
        <input type="text" value="{{ user.kelas }}" style="width: 100%; padding: 12px 16px; border: 1px solid #e2e8f0; border-radius: 10px; background: #f8fafc; color: #0f172a; font-weight: 500;" readonly>
    </div>

    <div class="form-group" style="margin-bottom: 16px;">
        <label style="display: block; margin-bottom: 6px; font-weight: 600; color: #475569;">No. WhatsApp / Kontak</label>
        <input type="text" value="{{ user.kontak }}" style="width: 100%; padding: 12px 16px; border: 1px solid #e2e8f0; border-radius: 10px; background: #f8fafc; color: #0f172a; font-weight: 500;" readonly>
    </div>

    <div class="form-group" style="margin-bottom: 24px;">
        <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #475569;">Status Anggota</label>
        <div>
            <span class="status-badge" style="font-size: 13px; padding: 6px 16px;">Aktif</span>
        </div>
    </div>

    <div style="display: flex; gap: 12px; justify-content: flex-end; border-top: 1px solid #f1f5f9; padding-top: 20px;">
        <a href="{% url 'url_daftar' %}" class="btn btn-secondary" style="text-decoration: none;">Kembali</a>
        <a href="/user/edit/?id={{ user.id }}" class="btn" style="background: #2563eb; color: white; text-decoration: none; padding: 10px 20px; border-radius: 8px; font-weight: 600;">Edit Data</a>
    </div>
</div>
{% endblock %}
